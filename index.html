<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天越天堂｜官方網站</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background:black;
overflow-x:hidden;
}

.bg{
position:fixed;
width:100%;
height:100%;
background:url('https://images.unsplash.com/photo-1606112219348-204d7d8b94ee') center/cover no-repeat;
filter:brightness(0.4);
z-index:-1;
animation:zoom 20s infinite alternate;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

.menu{
display:flex;
justify-content:center;
gap:20px;
padding:20px;
background:rgba(0,0,0,0.7);
position:sticky;
top:0;
}

.menu button{
background:none;
border:1px solid #00ffff;
color:#00ffff;
padding:10px 15px;
cursor:pointer;
}

.section{
display:none;
padding:30px;
}

.active{
display:block;
}

h1{
text-align:center;
color:#00ffff;
}

.card{
background:rgba(0,0,0,0.7);
padding:20px;
margin:15px 0;
border:1px solid #00ffff;
}
</style>

</head>

<body>

<div class="bg"></div>

<div class="menu">
<button onclick="show('home')">首頁</button>
<button onclick="show('newbie')">新手教學</button>
<button onclick="show('equip')">裝備系統</button>
<button onclick="show('helper')">內掛教學</button>
<button onclick="show('reborn')">轉生系統</button>
<button onclick="show('donate')">贊助</button>
</div>

<div id="home" class="section active">
<h1>🔥天越天堂🔥</h1>
<div class="card">
封測開放中｜免費｜高倍率｜輕鬆掛機
</div>
</div>

<div id="newbie" class="section"></div>
<div id="equip" class="section"></div>
<div id="helper" class="section"></div>
<div id="reborn" class="section"></div>
<div id="donate" class="section"></div>

<script>
function show(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
