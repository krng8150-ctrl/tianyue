      color: #ffd66b;
      font-size: 28px;
    }
    .card p, .card li {

      color: #fff;
    }
    .grid {

      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }
    .link {
      color: #ffd66b;
      font-weight: 800;
      word-break: break-all;
    }
    .footer {
      text-align: center;
      color: #d2c39c;
      padding: 40px 16px 20px;
      font-size: 14px;
    }
    @media (max-width: 768px) {
      .hero h1 { font-size: 32px; }
      .hero p, .card p, .card li { font-size: 16px; }
      .grid { grid-template-columns: 1fr; }
      .btn { width: 100%; }
