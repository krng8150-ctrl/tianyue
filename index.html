<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天越天堂 v1000</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background:black;
}

.bg{
position:fixed;
width:100%;
height:100%;
background:
linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.9)),
url('https://picsum.photos/1920/1080?random=888');
background-size:cover;
z-index:-1;
}

.menu{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

.menu button{
background:black;
border:1px solid #00ffff;
color:#00ffff;
padding:10px;
}

.section{
display:none;
padding:20px;
}

.active{
display:block;
}

.card{
background:rgba(0,0,0,0.7);
border:1px solid #00ffff;
padding:15px;
margin:10px 0;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="menu">
<button onclick="show('home')">首頁</button>
<button onclick="show('newbie')">新手</button>
<button onclick="show('equip')">裝備</button>
<button onclick="show('helper')">內掛</button>
<button onclick="show('reborn')">轉生</button>
<button onclick="show('donate')">贊助</button>
</div>

<div id="home" class="section active">
<div class="card">
🔥 天越天堂 🔥<br>
封測開放中｜免費｜高倍率｜輕鬆掛機
</div>
</div>

<div id="newbie" class="section">
<div class="card">
新手流程：<br>
1. 練到50等<br>
2. 打傲慢幣<br>
3. 做裝備<br>
4. 往高階發展
</div>
</div>

<div id="equip" class="section">
<div class="card">
裝備系統：<br>
✔ 永恆項鍊<br>
✔ 耳環<br>
✔ 戒指<br>
✔ 腰帶<br>
✔ 高階防具
</div>
</div>

<div id="helper" class="section">
<div class="card">
內掛重點：<br>
✔ 自動打怪<br>
✔ 範圍150~200<br>
✔ 補血60%
</div>
</div>

<div id="reborn" class="section">
<div class="card">
轉生系統：<br>
最高10轉<br>
大幅提升能力
</div>
</div>

<div id="donate" class="section">
<div class="card">
贊助比例：<br>
1元 = 5元寶
</div>
</div>

<script>
function show(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
