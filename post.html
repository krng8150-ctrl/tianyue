.btn{

.copy{

.toggle{

    font-size:18px;
    font-weight:900;

    font-size:14px;

function setTemplate(type, btn){

    const buttons = document.querySelectorAll(".tab-btn");
    buttons.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
}

function copyText(){

    text.select();
    text.setSelectionRange(0, 99999);
    document.execCommand("copy");

function toggleText(){
