<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>技能掉落查詢</title>

<style>
body {
  background:#0d1b36;
  color:#fff;
  font-family:"Microsoft JhengHei";
  padding:20px;
}

h1 {
  text-align:center;
  color:#ffd84d;
}

input,select,button {
  padding:10px;
  border-radius:10px;
  border:none;
  margin:5px;
}

button {
  background:#4d7cff;
  color:#fff;
}

.card {
  background:#1a2a5a;
  border-radius:15px;
  padding:15px;
  margin:10px 0;
}

.skill {
  color:#ffd84d;
  font-size:18px;
  font-weight:bold;
}

.job {
  color:#9ecbff;
  margin-bottom:10px;
}

</style>
</head>

<body>

<h1>技能掉落查詢</h1>

<input id="search" placeholder="搜尋技能或怪物">
<select id="job">
<option value="">全部職業</option>
<option>王子</option>
<option>騎士</option>
<option>妖精</option>
<option>魔法師</option>
<option>黑暗妖精</option>
<option>龍騎士</option>
<option>幻術師</option>
</select>

<button onclick="load()">查詢</button>

<div id="list"></div>

<script>

const data = [

/* ================= 王子 ================= */
{job:"王子",skill:"衝擊士氣",mobs:["商城取得"]},
{job:"王子",skill:"援護盟友",mobs:["商城取得"]},
{job:"王子",skill:"鋼鐵士氣",mobs:["商城取得"]},
{job:"王子",skill:"激勵士氣",mobs:["商城取得"]},
{job:"王子",skill:"王者加護",mobs:["商城取得"]},

/* ================= 騎士 ================= */
{job:"騎士",skill:"增幅防禦",mobs:["BOSS怪物"]},

/* ================= 妖精 ================= */
{job:"妖精",skill:"三重矢",mobs:["九尾狐","亞力安","多眼怪","巨人","夢魘","格利芬","火焰弓箭手"]},
{job:"妖精",skill:"精準射擊",mobs:["幽冥大將軍","牛鬼","赤鬼"]},
{job:"妖精",skill:"屬性之火",mobs:["伊弗利特","火靈之王"]},
{job:"妖精",skill:"大地屏障",mobs:["沙蟲","巨蟻女王"]},
{job:"妖精",skill:"風之神射",mobs:["巴列斯","變形怪首領"]},
{job:"妖精",skill:"風之枷鎖",mobs:["林德拜爾","格利芬"]},
{job:"妖精",skill:"水之元氣",mobs:["龍龜","深海怪物"]},

/* ================= 魔法師 ================= */
{job:"魔法師",skill:"絕對屏障",mobs:["牛鬼","赤鬼","黑暗精靈使"]},
{job:"魔法師",skill:"聖結界",mobs:["死亡騎士","梅杜莎","黑暗妖精法師"]},
{job:"魔法師",skill:"流星雨",mobs:["巴拉卡斯","黑暗妖精將軍"]},
{job:"魔法師",skill:"火風暴",mobs:["伊弗利特","不死鳥"]},
{job:"魔法師",skill:"召喚術",mobs:["安塔瑞斯","林德拜爾"]},
{job:"魔法師",skill:"變形術",mobs:["牛鬼","赤鬼"]},

/* ================= 黑暗妖精 ================= */
{job:"黑暗妖精",skill:"雙重破壞",mobs:["安塔瑞斯","林德拜爾","黑暗妖精將軍"]},
{job:"黑暗妖精",skill:"燃燒鬥志",mobs:["黑暗妖精士兵","闇之精靈"]},
{job:"黑暗妖精",skill:"附加劇毒",mobs:["殭屍","黑暗妖精士兵"]},
{job:"黑暗妖精",skill:"破壞盔甲",mobs:["牛鬼","赤鬼"]},
{job:"黑暗妖精",skill:"迴避提升",mobs:["黑暗妖精殘兵"]},

/* ================= 龍騎士 ================= */
{job:"龍騎士",skill:"奪命之雷",mobs:["牛鬼","赤鬼","阿勒尼亞"]},

/* ================= 幻術師 ================= */
{job:"幻術師",skill:"幻覺：化身",mobs:["牛鬼","赤鬼","阿勒尼亞"]}

];

function load(){
  const kw=document.getElementById("search").value;
  const job=document.getElementById("job").value;

  const list=document.getElementById("list");
  list.innerHTML="";

  const result=data.filter(x=>{
    return (!job||x.job==job)&&
    (x.skill.includes(kw)||x.mobs.join().includes(kw)||x.job.includes(kw));
  });

  if(result.length==0){
    list.innerHTML="查無資料";
    return;
  }

  result.forEach(x=>{
    list.innerHTML+=`
    <div class="card">
      <div class="skill">${x.skill}</div>
      <div class="job">${x.job}</div>
      <div>${x.mobs.join("、")}</div>
    </div>`;
  });
}

load();

</script>

</body>
</html>
