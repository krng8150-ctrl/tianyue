    }

    }

      font-weight: bold;

      font-size: 22px;
      font-weight: bold;
    }

      margin-bottom: 14px;
      font-size: 15px;
    }
    .grid {

      grid-template-columns: repeat(2, minmax(0,1fr));

    }

      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;

      display: inline-block;
      background: rgba(83,124,255,.18);

      color: #cfe0ff;
      border-radius: 999px;
      padding: 6px 12px;

      padding: 30px 20px;
      text-align: center;
      color: #d4dcff;
      font-size: 18px;
