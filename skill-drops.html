<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>技能掉落查詢｜天越天堂</title>
  <style>
    *{box-sizing:border-box;}
    body{
      margin:0;
      font-family:"Microsoft JhengHei",sans-serif;
      background:linear-gradient(180deg,#071224,#0e1b35 55%,#09111f);
      color:#fff;
      padding:20px;
    }
    .wrap{
      max-width:1200px;
      margin:0 auto;
    }
    .top-box,
    .panel,
    .card{
      background:rgba(14,22,44,.92);
      border:1px solid rgba(255,215,90,.16);
      border-radius:24px;
      box-shadow:0 12px 28px rgba(0,0,0,.35);
    }
    .top-box{
      padding:28px 22px;
      margin-bottom:20px;
    }
    .title{
      text-align:center;
      color:#ffd84d;
      font-weight:bold;
      font-size:36px;
      margin-bottom:12px;
    }
    .desc{
      text-align:center;
      color:#dbe6ff;
      line-height:1.9;
      font-size:16px;
    }
    .notice{
      margin-top:18px;
      padding:16px;
      border-radius:18px;
      background:rgba(255,220,120,.10);
      border:1px solid rgba(255,220,120,.20);
      color:#ffe994;
      line-height:1.9;
      font-size:15px;
    }
    .panel{
      padding:20px;
      margin-bottom:20px;
    }
    .search-row{
      display:grid;
      grid-template-columns:1fr 220px 150px 150px;
      gap:12px;
      margin-bottom:16px;
    }
    .search-row input,
    .search-row select,
    .search-row button{
      border:none;
      border-radius:16px;
      padding:14px 16px;
      font-size:16px;
    }
    .search-row input,
    .search-row select{
      background:#fff;
      color:#111;
    }
    .btn-search{
      background:linear-gradient(135deg,#3f7bff,#2952ff);
      color:#fff;
      font-weight:bold;
      cursor:pointer;
    }
    .btn-clear{
      background:linear-gradient(135deg,#7c879c,#5e687c);
      color:#fff;
      font-weight:bold;
      cursor:pointer;
    }
    .quick-tags{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }
    .quick-tags button{
      border:1px solid rgba(255,255,255,.14);
      background:rgba(93,125,255,.16);
      color:#dce6ff;
      border-radius:999px;
      padding:10px 16px;
      font-size:15px;
      cursor:pointer;
    }
    .bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin:16px 0 12px;
      gap:10px;
      flex-wrap:wrap;
    }
    .sec-title{
      color:#61bbff;
      font-weight:bold;
      font-size:28px;
    }
    .count{
      color:#d7e3ff;
      font-size:15px;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:16px;
    }
    .card{
      padding:18px;
    }
    .job{
      display:inline-block;
      background:rgba(86,132,255,.18);
      border:1px solid rgba(133,171,255,.35);
      border-radius:999px;
      padding:6px 12px;
      color:#dbe6ff;
      font-size:13px;
      margin-bottom:10px;
    }
    .skill{
      color:#ffe04e;
      font-weight:bold;
      font-size:25px;
      margin-bottom:6px;
      line-height:1.4;
    }
    .item-type{
      color:#8fb8ff;
      font-size:14px;
      margin-bottom:12px;
    }
    .mob-title{
      color:#ffffff;
      font-size:15px;
      font-weight:bold;
      margin-bottom:8px;
    }
    .mobs{
      margin:0;
      padding-left:20px;
      color:#eef3ff;
      line-height:1.85;
      font-size:16px;
    }
    .empty{
      text-align:center;
      padding:40px 20px;
      color:#d8e3ff;
      font-size:18px;
    }
    .back{
      margin-top:24px;
      text-align:center;
    }
    .back a{
      display:inline-block;
      text-decoration:none;
      background:linear-gradient(135deg,#f8de6b,#f2b54b);
      color:#161616;
      font-weight:bold;
      font-size:22px;
      padding:16px 34px;
      border-radius:20px;
      box-shadow:0 8px 20px rgba(0,0,0,.28);
    }

    @media (max-width: 900px){
      .title{font-size:30px;}
      .search-row{grid-template-columns:1fr;}
      .grid{grid-template-columns:1fr;}
      .back a{display:block;width:100%;}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-box">
      <div class="title">技能掉落查詢</div>
      <div class="desc">
        本頁提供各職業技能掉落怪物查詢。<br>
        可直接搜尋技能名稱、怪物名稱，或依職業分類快速查找。
      </div>
      <div class="notice">
        ※ 本頁為靜態查詢頁面，不連接遊戲主機、不直接連資料庫。<br>
        ※ 玩家只能查看資料，無法對遊戲資料做任何操作。<br>
        ※ 若後續伺服器有調整掉落內容，請以遊戲內最新版本為準。
      </div>
    </div>

    <div class="panel">
      <div class="search-row">
        <input id="keyword" type="text" placeholder="輸入技能名稱、怪物名稱、職業，例如：會心一擊、三重矢、黑暗妖精、流星雨">
        <select id="jobFilter">
          <option value="">全部職業</option>
          <option value="騎士">騎士</option>
          <option value="妖精">妖精</option>
          <option value="黑暗妖精">黑暗妖精</option>
          <option value="龍騎士">龍騎士</option>
          <option value="幻術師">幻術師</option>
          <option value="魔法師">魔法師</option>
        </select>
        <button class="btn-search" onclick="renderData()">查詢</button>
        <button class="btn-clear" onclick="clearSearch()">清空</button>
      </div>

      <div class="quick-tags">
        <button onclick="setKeyword('會心一擊')">會心一擊</button>
        <button onclick="setKeyword('三重矢')">三重矢</button>
        <button onclick="setKeyword('絕對屏障')">絕對屏障</button>
        <button onclick="setKeyword('聖結界')">聖結界</button>
        <button onclick="setKeyword('流星雨')">流星雨</button>
        <button onclick="setJob('騎士')">騎士</button>
        <button onclick="setJob('妖精')">妖精</button>
        <button onclick="setJob('黑暗妖精')">黑暗妖精</button>
        <button onclick="setJob('龍騎士')">龍騎士</button>
        <button onclick="setJob('幻術師')">幻術師</button>
        <button onclick="setJob('魔法師')">魔法師</button>
      </div>
    </div>

    <div class="bar">
      <div class="sec-title">技能掉落整理</div>
      <div class="count" id="countText">讀取中...</div>
    </div>

    <div id="resultArea" class="grid"></div>

    <div class="back">
      <a href="index.html">⬅ 返回首頁</a>
    </div>
  </div>

  <script src="skill-drops-data.js"></script>
  <script>
    const allData = window.SKILL_DROP_DATA || [];

    function normalizeText(text) {
      return (text || '').toString().trim().toLowerCase();
    }

    function renderData() {
      const keyword = normalizeText(document.getElementById('keyword').value);
      const job = document.getElementById('jobFilter').value;
      const resultArea = document.getElementById('resultArea');
      const countText = document.getElementById('countText');

      let html = '';
      let count = 0;

      for (let i = 0; i < allData.length; i++) {
        const item = allData[i];

        const matchJob = !job || item.job === job;
        const matchKeyword =
          !keyword ||
          normalizeText(item.skill).includes(keyword) ||
          normalizeText(item.job).includes(keyword) ||
          normalizeText(item.itemType).includes(keyword) ||
          hasMobKeyword(item.mobs, keyword);

        if (matchJob && matchKeyword) {
          count++;

          html += `
            <div class="card">
              <div class="job">${item.job}</div>
              <div class="skill">${item.skill}</div>
              <div class="item-type">${item.itemType}</div>
              <div class="mob-title">掉落怪物：</div>
              <ul class="mobs">
                ${item.mobs.map(mob => `<li>${mob}</li>`).join('')}
              </ul>
            </div>
          `;
        }
      }

      countText.innerHTML = `目前共找到 ${count} 筆技能資料。`;

      if (count === 0) {
        html = `<div class="panel empty">查無符合資料，請換個關鍵字試試看。</div>`;
      }

      resultArea.innerHTML = html;
    }

    function hasMobKeyword(mobs, keyword) {
      for (let i = 0; i < mobs.length; i++) {
        if (normalizeText(mobs[i]).includes(keyword)) {
          return true;
        }
      }
      return false;
    }

    function clearSearch() {
      document.getElementById('keyword').value = '';
      document.getElementById('jobFilter').value = '';
      renderData();
    }

    function setKeyword(text) {
      document.getElementById('keyword').value = text;
      renderData();
    }

    function setJob(job) {
      document.getElementById('jobFilter').value = job;
      renderData();
    }

    renderData();
  </script>
</body>
</html>
