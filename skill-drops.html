<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>技能掉落查詢</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  padding: 20px;
  font-family: "Microsoft JhengHei", Arial, sans-serif;
  background: linear-gradient(180deg, #08101f 0%, #0d1b36 100%);
  color: #fff;
}

.wrap {
  max-width: 1100px;
  margin: 0 auto;
}

.title-box {
  background: rgba(10,14,28,.88);
  border: 1px solid rgba(255,215,0,.18);
  border-radius: 22px;
  padding: 22px 18px;
  box-shadow: 0 10px 28px rgba(0,0,0,.35);
  margin-bottom: 18px;
}

h1 {
  margin: 0 0 10px;
  text-align: center;
  color: #ffd84d;
  font-size: 38px;
  line-height: 1.2;
}

.sub {
  text-align: center;
  color: #cfd8ff;
  font-size: 15px;
}

.search-box {
  display: grid;
  grid-template-columns: 1fr 220px 120px 120px;
  gap: 12px;
  margin: 18px 0 16px;
}

.search-box input,
.search-box select,
.search-box button {
  border: none;
  border-radius: 16px;
  padding: 14px 16px;
  font-size: 16px;
}

.search-box input,
.search-box select {
  background: #fff;
  color: #222;
}

.btn-search {
  background: linear-gradient(135deg,#4d7cff,#2d53ff);
  color: #fff;
  font-weight: bold;
  cursor: pointer;
}

.btn-reset {
  background: linear-gradient(135deg,#6f7b9b,#4d5877);
  color: #fff;
  font-weight: bold;
  cursor: pointer;
}

.quick-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 18px;
}

.quick-tags button {
  border: 1px solid rgba(255,255,255,.16);
  background: rgba(130,160,255,.15);
  color: #dfe7ff;
  border-radius: 999px;
  padding: 10px 16px;
  font-size: 15px;
  cursor: pointer;
}

.section-title {
  margin: 24px 0 10px;
  color: #67b7ff;
  font-size: 22px;
  font-weight: bold;
}

.count-text {
  color: #d7def7;
  margin-bottom: 14px;
  font-size: 15px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0,1fr));
  gap: 16px;
}

.card {
  background: rgba(24,35,72,.92);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 22px;
  padding: 18px 18px 14px;
  box-shadow: 0 8px 24px rgba(0,0,0,.22);
}

.skill-name {
  color: #ffe14a;
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 10px;
  line-height: 1.4;
}

.job-tag {
  display: inline-block;
  background: rgba(83,124,255,.18);
  border: 1px solid rgba(130,167,255,.35);
  color: #cfe0ff;
  border-radius: 999px;
  padding: 6px 12px;
  font-size: 13px;
  margin-bottom: 12px;
}

.mob-list {
  margin: 0;
  padding-left: 22px;
  color: #f2f5ff;
  line-height: 1.8;
  font-size: 16px;
}

.empty,
.loading,
.error {
  background: rgba(24,35,72,.92);
  border-radius: 20px;
  padding: 30px 20px;
  text-align: center;
  color: #d4dcff;
  font-size: 18px;
}

.error {
  color: #ffd1d1;
}

.back-home {
  margin-top: 22px;
  text-align: center;
}

.back-home a {
  display: inline-block;
  background: linear-gradient(135deg,#f9d85d,#f3b33e);
  color: #111;
  text-decoration: none;
  font-weight: bold;
  font-size: 24px;
  padding: 16px 32px;
  border-radius: 20px;
  box-shadow: 0 8px 20px rgba(0,0,0,.25);
}

@media (max-width: 900px) {
  .search-box {
    grid-template-columns: 1fr;
  }
  .grid {
    grid-template-columns: 1fr;
  }
  h1 {
    font-size: 30px;
  }
  .back-home a {
    width: 100%;
    font-size: 20px;
  }
}
</style>
</head>
<body>
  <div class="wrap">
    <div class="title-box">
      <h1>技能掉落查詢</h1>
      <div class="sub">網站會直接讀取資料庫掉落內容，自動更新。</div>
    </div>

    <div class="search-box">
      <input id="searchInput" type="text" placeholder="輸入技能名稱、怪物名稱、職業，例如：會心一擊、絕對屏障、黑暗妖精、魔法師">
      <select id="jobFilter">
        <option value="">全部職業</option>
        <option value="王子">王子</option>
        <option value="騎士">騎士</option>
        <option value="妖精">妖精</option>
        <option value="魔法師">魔法師</option>
        <option value="黑暗妖精">黑暗妖精</option>
        <option value="龍騎士">龍騎士</option>
        <option value="幻術師">幻術師</option>
      </select>
      <button class="btn-search" onclick="renderData()">查詢</button>
      <button class="btn-reset" onclick="resetSearch()">清空</button>
    </div>

    <div class="quick-tags">
      <button onclick="setQuick('聖結界')">聖結界</button>
      <button onclick="setQuick('絕對屏障')">絕對屏障</button>
      <button onclick="setQuick('三重矢')">三重矢</button>
      <button onclick="setQuick('雙重破壞')">雙重破壞</button>
      <button onclick="setQuick('妖精')">妖精</button>
      <button onclick="setQuick('黑暗妖精')">黑暗妖精</button>
      <button onclick="setQuick('魔法師')">魔法師</button>
      <button onclick="setQuick('龍騎士')">龍騎士</button>
      <button onclick="setQuick('幻術師')">幻術師</button>
    </div>

    <div class="section-title">技能掉落整理</div>
    <div class="count-text" id="countText">讀取中...</div>
    <div id="resultArea" class="grid">
      <div class="loading">資料讀取中...</div>
    </div>

    <div class="back-home">
      <a href="index.html">⬅ 返回首頁</a>
    </div>
  </div>

<script>
const API_URL = 'https://你的PHP主機網址/api/skill-drops.php';

let allData = [];

function normalizeText(text) {
  return (text || "").toLowerCase().trim();
}

async function loadData() {
  const resultArea = document.getElementById("resultArea");
  const countText = document.getElementById("countText");

  resultArea.innerHTML = '<div class="loading">資料讀取中...</div>';
  countText.textContent = '資料讀取中...';

  try {
    const res = await fetch(API_URL + '?t=' + Date.now());
    const json = await res.json();

    if (!json.ok) {
      throw new Error(json.error || '讀取失敗');
    }

    allData = json.data || [];
    renderData();
  } catch (err) {
    countText.textContent = '資料讀取失敗';
    resultArea.innerHTML = '<div class="error">無法讀取資料庫內容，請稍後再試。</div>';
  }
}

function renderData() {
  const keyword = normalizeText(document.getElementById("searchInput").value);
  const job = document.getElementById("jobFilter").value;
  const resultArea = document.getElementById("resultArea");
  const countText = document.getElementById("countText");

  const filtered = allData.filter(item => {
    const matchJob = !job || item.job === job;
    const matchKeyword =
      !keyword ||
      normalizeText(item.skill).includes(keyword) ||
      normalizeText(item.job).includes(keyword) ||
      (item.mobs || []).some(m => normalizeText(m).includes(keyword));
    return matchJob && matchKeyword;
  });

  countText.textContent = `目前共找到 ${filtered.length} 筆技能資料。`;

  if (!filtered.length) {
    resultArea.innerHTML = `<div class="empty">查無符合資料，請換關鍵字再試。</div>`;
    return;
  }

  resultArea.innerHTML = filtered.map(item => `
    <div class="card">
      <div class="skill-name">${item.skill}</div>
      <div class="job-tag">${item.job}</div>
      <ul class="mob-list">
        ${(item.mobs || []).map(mob => `<li>${mob}</li>`).join("")}
      </ul>
    </div>
  `).join("");
}

function resetSearch() {
  document.getElementById("searchInput").value = "";
  document.getElementById("jobFilter").value = "";
  renderData();
}

function setQuick(text) {
  document.getElementById("searchInput").value = text;
  renderData();
}

loadData();
</script>
</body>
</html>
